name: Weibo Auto Archive

on:
  schedule:
    - cron: '17 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 拉取本仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 克隆 weibo-crawler 主程序
        run: |
          git clone --depth 1 https://github.com/dataabc/weibo-crawler.git crawler
          cd crawler
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 注入 Cookie 到 config.json
        env:
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
        run: |
          if [ -z "$WEIBO_COOKIE" ]; then
            echo "❌ 未设置 WEIBO_COOKIE Secret"
            exit 1
          fi
          cp config.json crawler/config.json
          python -c "
          import json, os
          with open('crawler/config.json', 'r', encoding='utf-8') as f:
              cfg = json.load(f)
          cfg['cookie'] = os.environ['WEIBO_COOKIE']
          with open('crawler/config.json', 'w', encoding='utf-8') as f:
              json.dump(cfg, f, ensure_ascii=False, indent=4)
          print('✅ Cookie 已注入')
          "

      - name: 把历史归档数据放回去（实现增量爬取）
        run: |
          if [ -d "weibo" ]; then
            cp -r weibo crawler/
            echo "✅ 已加载历史数据"
          else
            echo "ℹ️ 首次运行，将爬取全部历史微博"
          fi

      - name: 执行 weibo-crawler
        run: |
          cd crawler
          python weibo.py

      - name: 把新数据搬回仓库根目录
        run: |
          if [ -d "crawler/weibo" ]; then
            rm -rf weibo
            cp -r crawler/weibo ./
            echo "✅ 数据已更新"
          fi

      - name: 提交变更并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weibo/ || true
          if git diff --staged --quiet; then
            echo "ℹ️ 本次无新微博，跳过提交"
          else
            git commit -m "🤖 Auto-archive $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ 已推送到仓库"
          fi
